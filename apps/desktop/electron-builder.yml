appId: com.smarttodo.desktop
productName: Smart Todo
directories:
  buildResources: resources
  output: release
files:
  - dist/**/*
  - package.json
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: resources/icon.icns
win:
  target:
    - nsis
  icon: resources/icon.ico
linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: resources
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
protocols:
  - name: Smart Todo
    schemes:
      - smarttodo
